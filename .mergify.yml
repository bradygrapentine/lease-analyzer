# Mergify configuration — Wave 30-C; queue action wired post-Wave-31.
#
# Defensive: GitHub branch protection on `main` is the authoritative
# gate (required_status_checks + enforce_admins=true). This file makes
# Mergify's queue check converge on the same set of required contexts
# so a queued PR cannot be merged via Mergify while any required check
# is red. See docs/wave30-ci-postmortem.md for the W28 root cause.

queue_rules:
  - name: default
    queue_conditions:
      - base=main
      - check-success=verify
      - check-success=smoke (chromium)
      - check-success=smoke (firefox)
      - check-success=smoke (webkit)
      - check-success=Lighthouse CI (a11y >=95, best-practices >=90, PWA-installable audits)
      - check-success=npm-audit
    merge_conditions:
      - check-success=verify
      - check-success=smoke (chromium)
      - check-success=smoke (firefox)
      - check-success=smoke (webkit)
      - check-success=Lighthouse CI (a11y >=95, best-practices >=90, PWA-installable audits)
      - check-success=npm-audit
    merge_method: squash

pull_request_rules:
  - name: enqueue PRs labelled automerge
    # Trigger: add the `automerge` label to a PR (UI or
    # `gh pr edit <num> --add-label automerge`). Mergify routes it
    # into the `default` queue, which rebases each PR in sequence
    # before merging — necessary because branch protection on `main`
    # has `strict: true` ("Require branches to be up to date") and
    # GitHub's native auto-merge does not update branches.
    #
    # `auto_merge_enabled` was tried first (PR #138) but isn't a valid
    # Mergify condition in this version. Label-based triggering is
    # universally supported and explicit about user intent.
    conditions:
      - base=main
      - label=automerge
      - -draft
    actions:
      queue:
        name: default

  - name: refuse merge while any required check is failing
    conditions:
      - base=main
      - or:
          - check-failure=verify
          - check-failure=smoke (chromium)
          - check-failure=smoke (firefox)
          - check-failure=smoke (webkit)
          - check-failure=Lighthouse CI (a11y >=95, best-practices >=90, PWA-installable audits)
          - check-failure=npm-audit
    actions:
      comment:
        message: |
          Mergify will not merge this PR — at least one required check
          is failing. Branch protection (`enforce_admins=true`) also
          blocks admin merges. See `docs/wave30-ci-postmortem.md`.
