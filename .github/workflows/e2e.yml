name: e2e

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json
      - name: Install root dev deps (Playwright runner)
        run: npm ci
      - name: Install app deps
        working-directory: app
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('package-lock.json') }}
          restore-keys: ms-playwright-${{ runner.os }}-${{ matrix.browser }}-
      - name: Install ${{ matrix.browser }} + system deps
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Fetch design fonts
        working-directory: app
        run: npm run build:design-fonts
      - name: Build app
        working-directory: app
        run: npm run build
      - name: Run e2e smoke (${{ matrix.browser }})
        env:
          CI: 'true'
        run: npx playwright test --project=${{ matrix.browser }}
      - name: Upload Playwright HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
