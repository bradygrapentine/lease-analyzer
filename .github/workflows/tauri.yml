name: tauri

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Tauri build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundles: deb
            artifact-name: leaseguard-linux-deb
            artifact-path: app/src-tauri/target/release/bundle/deb/*.deb
          - os: macos-latest
            bundles: app,dmg
            artifact-name: leaseguard-macos
            artifact-path: |
              app/src-tauri/target/release/bundle/dmg/*.dmg
              app/src-tauri/target/release/bundle/macos/*.app
          - os: windows-latest
            bundles: msi
            artifact-name: leaseguard-windows-msi
            artifact-path: app/src-tauri/target/release/bundle/msi/*.msi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2.0"

      - name: Install npm dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri app
        working-directory: app
        run: cargo tauri build --bundles ${{ matrix.bundles }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
